name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Refresh the live snapshot every 10 minutes (GitHub may add delay)
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # PREVIOUS_DATA_URL (the 30-day compliance lock state) is derived from
      # GITHUB_REPOSITORY inside the script, so scheduled runs work too.
      - name: Build static snapshot (live data)
        run: node scripts/build-static.js

      # Pushing a gh-pages branch auto-enables Pages serving for the repo;
      # the workflow token cannot create a Pages site via the API.
      - name: Publish to gh-pages branch
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
